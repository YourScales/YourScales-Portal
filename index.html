<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>YourScales - Client Portal</title>
    <link rel="icon" type="image/x-icon" href="https://yourscales.com/favicon.ico">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
        }

        body {
            background-color: #000000;
            color: #ffffff;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            overflow: hidden;
        }

        .portal-container {
            width: 100%;
            max-width: 420px;
            padding: 40px 20px;
            text-align: center;
        }

        .logo {
            font-size: 28px;
            font-weight: 700;
            letter-spacing: -0.5px;
            margin-bottom: 8px;
            background: linear-gradient(180deg, #ffffff 0%, #a3a3a3 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .subtitle {
            color: #a3a3a3;
            font-size: 14px;
            margin-bottom: 32px;
        }

        .form-group {
            text-align: left;
            margin-bottom: 20px;
        }

        label {
            display: block;
            font-size: 12px;
            font-weight: 500;
            color: #a3a3a3;
            margin-bottom: 8px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        input {
            width: 100%;
            padding: 14px;
            background-color: #0a0a0a;
            border: 1px solid #262626;
            border-radius: 8px;
            color: #ffffff;
            font-size: 15px;
            transition: all 0.2s ease;
        }

        input:focus {
            outline: none;
            border-color: #404040;
            background-color: #0f0f0f;
        }

        .btn-primary {
            width: 100%;
            padding: 14px;
            background-color: #ffffff;
            color: #000000;
            border: none;
            border-radius: 8px;
            font-size: 15px;
            font-weight: 600;
            cursor: pointer;
            margin-top: 10px;
            transition: opacity 0.2s ease;
        }

        .btn-primary:hover {
            opacity: 0.9;
        }

        .nav-links {
            margin-top: 32px;
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .nav-links a {
            color: #a3a3a3;
            text-decoration: none;
            font-size: 13px;
            transition: color 0.2s ease;
        }

        .nav-links a:hover {
            color: #ffffff;
        }

        /* The Updated Return Button styling */
        .btn-return {
            margin-top: 24px;
            display: inline-block;
            padding: 10px 20px;
            background-color: #171717;
            border: 1px solid #262626;
            border-radius: 20px;
            color: #a3a3a3;
            text-decoration: none;
            font-size: 12px;
            font-weight: 500;
            letter-spacing: 0.5px;
            transition: all 0.2s ease;
        }

        .btn-return:hover {
            background-color: #262626;
            color: #ffffff;
            border-color: #404040;
        }
    </style>
</head>
<body>

    <div class="portal-container">
        <div class="logo">YOURSCALES</div>
        <div class="subtitle">Secure Terminal Access Portal</div>

        <form onsubmit="event.preventDefault();">
            <div class="form-group">
                <label for="username">Terminal ID / Email</label>
                <input type="email" id="username" placeholder="name@company.com" required>
            </div>
            
            <div class="form-group">
                <label for="password">Security Passkey</label>
                <input type="password" id="password" placeholder="••••••••" required>
            </div>

            <button type="submit" class="btn-primary">Initialize Session</button>
        </form>

        <div class="nav-links">
            <a href="#">Forgot security passkey?</a>
            <a href="#">Request terminal authorization</a>
        </div>

        <a href="https://yourscales.com" class="btn-return">← Return to Main Terminal</a>
    </div>

</body>
</html>
